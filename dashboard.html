<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>To-Do Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="icons/arcticons--to-do.png">
    <link rel="stylesheet" href="style.css">

    <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

</head>

<body class="bg-slate-100 min-h-screen">

    <div class="bg-custom max-w-2xl mx-auto p-5">

        <!-- Header -->

        <div class="mb-8">

            <h1 class="text-3xl font-bold text-slate-800">
                My To-Do List
            </h1>

            <p class="text-slate-500">
                Stay organized and productive
            </p>

        </div>

        <!-- Add Task -->

        <div class="flex gap-3 mb-6">

            <input id="taskInput" type="text" placeholder="Add a new task..."
                class="flex-1 px-4 py-3 rounded-xl border outline-none focus:ring-2 focus:ring-slate-400">

            <button id="addBtn" class="bg-slate-800 text-white px-5 rounded-xl">

                <i class="fa-solid fa-plus"></i>

            </button>

        </div>

        <!-- Search -->

        <input id="searchInput" type="text" placeholder="Search tasks..."
            class="w-full px-4 py-3 rounded-xl border outline-none mb-6 focus:ring-2 focus:ring-slate-400">

        <!-- Stats -->

        <div class="bg-white rounded-xl p-4 mb-6 shadow-sm">

            <div class="flex justify-between">

                <span>Total Tasks</span>

                <span id="totalTasks">0</span>

            </div>

            <div class="flex justify-between mt-2">

                <span>Completed</span>

                <span id="completedTasks">0</span>

            </div>

        </div>

        <!-- Tasks -->

        <div id="taskList" class="space-y-3">

        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
